<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo List</title>


  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body class="h-full bg-slate-100 p-4">

  <div class="flex items-center justify-center h-full">
    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-6">

      
      <h1 class="task-title mb-6">My Tasks</h1>

      <div class="mb-6">
        <div class="flex justify-between text-xs text-gray-600 mb-2">
          <span id="progress-text">0 of 0 completed</span>
          <span id="progress-percent">0%</span>
        </div>
        <div class="h-2 bg-gray-200 rounded-full overflow-hidden">
          <div id="progress-bar" class="progress-fill h-full w-0"></div>
        </div>
      </div>
      <form id="task-form" class="flex gap-2 mb-6">
       <input
  id="task-input"
  type="text"
  placeholder="Add a new task..."
  autocomplete="off"
  spellcheck="false"
  class="flex-1 px-4 py-3 rounded-xl bg-gray-100 outline-none"
/>

        <button class="btn-hover px-5 py-3 rounded-xl font-bold">+</button>
      </form>

      <!-- Tasks -->
      <div id="task-list" class="space-y-2 max-h-64 overflow-y-auto"></div>

      <!-- Empty State -->
      <p id="empty-state" class="text-center text-gray-400 py-6">
        No tasks yet!
      </p>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
